name: collect-metrics

# Captures organic, third-party-sourced adoption metrics into /evidence/ and commits
# them, so the evidence trail is itself version-controlled and tamper-evident (design
# section 7). Runs on the 1st and 15th of each month — i.e. at least biweekly — because
# the GitHub Traffic API only exposes a rolling 14-day window; miss it and data is lost.

on:
  schedule:
    - cron: "0 6 1,15 * *"   # 06:00 UTC, 1st & 15th (within the 14-day traffic window)
  workflow_dispatch: {}        # allow manual runs

permissions:
  contents: write              # to commit the snapshot back to the repo

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The durable, append-only evidence trail lives on the unprotected `metrics`
      # data branch (main is protected by a required status check, so a scheduled
      # bot cannot push there — see the Publish step). Pull the latest trail into
      # the working tree first so metrics.csv / dashboard.html keep accumulating.
      - name: Load accumulated evidence trail
        run: |
          git fetch origin metrics || true
          if git show-ref --verify --quiet refs/remotes/origin/metrics; then
            rm -rf evidence
            git checkout origin/metrics -- evidence
            echo "restored evidence trail from origin/metrics"
          else
            echo "no metrics branch yet — seeding from main's evidence/"
          fi

      - name: Collect metrics
        env:
          # The Traffic API requires push access. The default github.token usually cannot
          # read traffic — set a repo-scoped PAT as the METRICS_TOKEN secret for full
          # coverage; without it, star/fork/release signals still capture.
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Concept record id (DOI 10.5281/zenodo.20823079); override via repo variable.
          ZENODO_RECORD_ID: ${{ vars.ZENODO_RECORD_ID || '20823079' }}
        run: python scripts/collect_metrics.py

      # Publish the snapshot to the `metrics` data branch. This keeps the evidence
      # trail version-controlled and tamper-evident without pushing to protected
      # main. The branch is orphan/evidence-only, so pushes are always fast-forward
      # and never blocked by main's required-status-check rule.
      - name: Publish evidence to the metrics data branch
        run: |
          set -e
          git config user.name "uagt-metrics-bot"
          git config user.email "actions@github.com"
          tmp="$(mktemp -d)"
          cp -R evidence "$tmp/evidence"
          git reset --hard                       # drop working changes (saved in $tmp)
          git fetch origin metrics || true
          if git show-ref --verify --quiet refs/remotes/origin/metrics; then
            git checkout -B metrics origin/metrics
          else
            git checkout --orphan metrics
            git rm -rfq . 2>/dev/null || true    # evidence-only branch: clear main's tree
          fi
          rm -rf evidence
          cp -R "$tmp/evidence" evidence
          git add -A
          if git diff --cached --quiet; then
            echo "no metric changes to commit"
          else
            git commit -q -m "metrics: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin metrics
            echo "published snapshot to the metrics branch"
          fi
