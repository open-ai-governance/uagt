id: MC-D1-03
title: AI system inventory and registration
domain: d1-accountability-governance
objective: >
  Maintain an inventory of AI systems and register in-scope systems with relevant
  authorities so systems can be tracked and governed by risk.
principle: "Visibility of AI systems in use"
evidence:
  - "AI system inventory/register"
  - "EU database registration record"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.4.2"
    label: "Resource documentation"
    relationship: partial
    confidence: low
    rationale: >
      A.4.2 documents AI resources but is not a system-of-record inventory; coverage is
      partial.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-1.6"
    label: "Mechanisms to inventory AI systems"
    relationship: full
    confidence: high
    rationale: >
      GOVERN 1.6 directly requires mechanisms to inventory AI systems, resourced by risk
      priority.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.49"
    label: "Registration"
    relationship: partial
    confidence: medium
    rationale: >
      Art.49 requires registration of high-risk systems in the EU database (Art.71); an
      external register, narrower than an internal inventory.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.5.9"
    label: "Inventory of information and other associated assets"
    relationship: partial
    confidence: medium
    rationale: >
      A.5.9 requires an inventory of assets; AI systems are governable assets, so the
      inventory pattern transfers, though it is not AI-specific.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      SOC 2 requires a system description and boundaries but has no asset-inventory
      criterion equivalent to an AI system register.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "BAI09"
    label: "Managed assets"
    relationship: full
    confidence: medium
    rationale: >
      BAI09 maintains an inventory of assets across their lifecycle - directly analogous to
      an AI system register.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
