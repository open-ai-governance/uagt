id: MC-D7-01
title: Operation monitoring and post-market surveillance
domain: d7-lifecycle-monitoring
objective: >
  Monitor AI systems in operation after deployment and maintain a plan to detect and respond
  to issues over time.
principle: "Watch systems over their life"
evidence:
  - "post-market monitoring plan"
  - "monitoring dashboards"
  - "performance review records"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "9.1"
    label: "Monitoring, measurement, analysis and evaluation"
    relationship: full
    confidence: high
    rationale: >
      Clause 9.1 with A.6.2.6 requires ongoing monitoring and evaluation.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-4.1"
    label: "Post-deployment monitoring plans implemented"
    relationship: full
    confidence: high
    rationale: >
      MANAGE 4.1 requires post-deployment monitoring plans.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.72"
    label: "Post-market monitoring by providers"
    relationship: full
    confidence: high
    rationale: >
      Art.72 requires a documented post-market monitoring system and plan.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.8.16"
    label: "Monitoring activities"
    relationship: partial
    confidence: medium
    rationale: >
      A.8.16 requires monitoring of systems for anomalous behaviour; it supports operational
      monitoring but is security-focused, not full lifecycle and post-market surveillance.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC7.2"
    label: "Monitors system components for anomalies"
    relationship: partial
    confidence: medium
    rationale: >
      CC7.2 (with CC4.1) provides ongoing operational monitoring; it supports post-
      deployment monitoring but is security-focused, not AI post-market surveillance.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "MEA01"
    label: "Managed performance and conformance monitoring"
    relationship: full
    confidence: medium
    rationale: >
      MEA01 (with DSS01) provides ongoing performance and conformance monitoring - a strong
      match for operation monitoring.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
