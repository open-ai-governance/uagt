id: MC-D5-02
title: Operator competence and human-AI configuration
domain: d5-human-oversight
objective: >
  Configure human-AI interaction and ensure operators are competent to oversee the system in
  its intended context.
principle: "Competent, well-configured oversight"
evidence:
  - "operator competence records"
  - "human-AI interaction design"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.9.4"
    label: "Intended use of the AI system"
    relationship: partial
    confidence: medium
    rationale: >
      A.9.4 with A.9.2 constrains use to intended purpose; operator competence is implied.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-3.5"
    label: "Human-oversight processes defined and assessed"
    relationship: full
    confidence: medium
    rationale: >
      MAP 3.5 with 3.4 defines and assesses human-oversight processes and operator
      proficiency.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.26"
    label: "Obligations of deployers of high-risk AI systems"
    relationship: full
    confidence: medium
    rationale: >
      Art.26 requires deployers to assign competent human oversight and use per
      instructions.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "7.2"
    label: "Competence"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.2 requires competence of personnel; it partially supports operator competence
      but does not address human-AI configuration or oversight.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC1.4"
    label: "Commitment to competence"
    relationship: partial
    confidence: low
    rationale: >
      CC1.4 supports operator competence generally but does not address human-AI
      configuration or oversight.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO07"
    label: "Managed human resources"
    relationship: partial
    confidence: low
    rationale: >
      APO07 manages competence of personnel; not specific to human-AI configuration or
      oversight.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
