id: MC-D4-03
title: Record-keeping and event logging
domain: d4-transparency-documentation
objective: >
  Automatically record events (logs) over the lifetime of an AI system to enable
  traceability and audit.
principle: "Traceability and auditability"
evidence:
  - "automatic event logs"
  - "log retention policy"
  - "audit trail"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.2.8"
    label: "AI system recording of event logs"
    relationship: full
    confidence: high
    rationale: >
      A.6.2.8 requires recording of event logs over the AI system life cycle.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-4.1"
    label: "Post-deployment monitoring incl. capture"
    relationship: partial
    confidence: medium
    rationale: >
      NIST captures logging within monitoring rather than as a discrete record-keeping
      control.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.12"
    label: "Record-keeping"
    relationship: full
    confidence: high
    rationale: >
      Art.12 with Art.19 and Art.26(6) requires automatic logging and retention.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.8.15"
    label: "Logging"
    relationship: full
    confidence: high
    rationale: >
      A.8.15 requires the production and protection of logs, a direct match for AI event-log
      record-keeping.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC7.2"
    label: "Monitors system components for anomalies (logging)"
    relationship: partial
    confidence: medium
    rationale: >
      CC7.2 relies on logging and monitoring of system components for anomalies; it supports
      event record-keeping but is security-event-scoped.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "DSS01"
    label: "Managed operations"
    relationship: partial
    confidence: medium
    rationale: >
      DSS01 (with DSS05) covers operational logging and monitoring; supports record-keeping
      but is operations-scoped.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.2.8"
    label: "Records related to processing of PII"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.2.8 requires records of PII processing; a privacy-scoped record-keeping
      analog.
    reviewer: "Vinod Dhiman"
