id: MC-D4-03
title: Record-keeping and event logging
domain: d4-transparency-documentation
objective: >
  Automatically record events (logs) over the lifetime of an AI system to enable
  traceability and audit.
principle: "Traceability and auditability"
evidence:
  - "automatic event logs"
  - "log retention policy"
  - "audit trail"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.2.8"
    label: "AI system recording of event logs"
    relationship: full
    confidence: high
    rationale: >
      A.6.2.8 requires recording of event logs over the AI system life cycle.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-4.1"
    label: "Post-deployment monitoring incl. capture"
    relationship: partial
    confidence: medium
    rationale: >
      NIST captures logging within monitoring rather than as a discrete record-keeping
      control.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.12"
    label: "Record-keeping"
    relationship: full
    confidence: high
    rationale: >
      Art.12 with Art.19 and Art.26(6) requires automatic logging and retention.
    reviewer: "Vinod Dhiman"
