id: MC-D6-05
title: Responsible design and development
domain: d6-robustness-accuracy-security
objective: >
  Define and follow processes for the responsible design and development of AI systems
  against documented requirements.
principle: "Build responsibly from the start"
evidence:
  - "design specification"
  - "development records"
  - "responsible-AI design checklist"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.1.3"
    label: "Processes for responsible design and development"
    relationship: full
    confidence: high
    rationale: >
      A.6.1.3 with A.6.1.2 and A.6.2.2 establishes responsible design and development
      processes.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-1.1"
    label: "Purpose, context and requirements documented"
    relationship: partial
    confidence: medium
    rationale: >
      MAP 1.1 documents purpose, context, and requirements driving design.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.16"
    label: "Obligations of providers of high-risk AI systems"
    relationship: partial
    confidence: low
    rationale: >
      Art.16 obliges providers to design systems to meet requirements; there is no single
      lifecycle article.
    reviewer: "Vinod Dhiman"
