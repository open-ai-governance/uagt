id: MC-D6-05
title: Responsible design and development
domain: d6-robustness-accuracy-security
objective: >
  Define and follow processes for the responsible design and development of AI systems
  against documented requirements.
principle: "Build responsibly from the start"
evidence:
  - "design specification"
  - "development records"
  - "responsible-AI design checklist"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.1.3"
    label: "Processes for responsible design and development"
    relationship: full
    confidence: high
    rationale: >
      A.6.1.3 with A.6.1.2 and A.6.2.2 establishes responsible design and development
      processes.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-1.1"
    label: "Purpose, context and requirements documented"
    relationship: partial
    confidence: medium
    rationale: >
      MAP 1.1 documents purpose, context, and requirements driving design.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.16"
    label: "Obligations of providers of high-risk AI systems"
    relationship: partial
    confidence: low
    rationale: >
      Art.16 obliges providers to design systems to meet requirements; there is no single
      lifecycle article.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.8.25"
    label: "Secure development life cycle"
    relationship: partial
    confidence: medium
    rationale: >
      A.8.25 with A.8.27 establishes a secure development lifecycle and secure engineering
      principles; aligns with responsible design but is security-scoped.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC8.1"
    label: "Change management / development lifecycle"
    relationship: partial
    confidence: medium
    rationale: >
      CC8.1 governs the development and change lifecycle (design, test, authorize), a
      partial analog to responsible AI design and development.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "BAI03"
    label: "Managed solutions identification and build"
    relationship: partial
    confidence: medium
    rationale: >
      BAI03 governs solution design and build; a partial analog to responsible AI design and
      development.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
