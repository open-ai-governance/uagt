id: MC-D2-02
title: AI system impact assessment
domain: d2-risk-impact-assessment
objective: >
  Assess the impacts of AI systems on individuals, groups, society, and fundamental rights
  before and during deployment.
principle: "Protect individuals, groups and society"
evidence:
  - "AI system impact assessment (ISO/IEC 42005)"
  - "fundamental-rights impact assessment"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.5.2"
    label: "AI system impact assessment process"
    relationship: full
    confidence: high
    rationale: >
      A.5.2-A.5.4 (clause 6.1.4/8.4), elaborated by ISO/IEC 42005, establish an AI system
      impact assessment.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-5.1"
    label: "Likelihood and magnitude of impacts documented"
    relationship: full
    confidence: medium
    rationale: >
      MAP 5.1 requires documenting the likelihood and magnitude of each impact.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.27"
    label: "Fundamental rights impact assessment for high-risk AI systems"
    relationship: full
    confidence: high
    rationale: >
      Art.27 mandates a fundamental-rights impact assessment for certain deployers.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27001 has no equivalent to an AI or fundamental-rights impact assessment; its
      risk focus is information-security impact to the organization.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      SOC 2 has no equivalent to an AI or fundamental-rights impact assessment.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      COBIT 2019 manages enterprise risk (APO12/EDM03) but has no fundamental-rights impact
      assessment.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.2.5"
    label: "Privacy impact assessment"
    relationship: partial
    confidence: medium
    rationale: >
      Clause 7.2.5 requires a privacy impact assessment; a privacy-scoped subset of a full
      AI or fundamental-rights impact assessment.
    reviewer: "Vinod Dhiman"
