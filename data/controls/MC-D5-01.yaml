id: MC-D5-01
title: Human oversight of AI systems
domain: d5-human-oversight
objective: >
  Ensure AI systems can be effectively overseen by people during use, including
  interpretation, intervention, and stop capability.
principle: "Meaningful human control"
evidence:
  - "human-oversight design records"
  - "intervention/override procedures"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.9.2"
    label: "Processes for responsible use of AI systems"
    relationship: partial
    confidence: medium
    rationale: >
      Annex A.9 addresses responsible use but not per-decision human intervention controls.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-3.2"
    label: "Policies define human roles and oversight"
    relationship: partial
    confidence: medium
    rationale: >
      GOVERN 3.2 sets the oversight expectation, not the operational intervention
      capability.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.14"
    label: "Human oversight"
    relationship: full
    confidence: high
    rationale: >
      Art.14 requires high-risk systems designed for effective human oversight,
      intervention, and stop.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27001 has no human-oversight-of-AI control; its access and segregation
      controls serve a different purpose.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      SOC 2 has no human-oversight-of-AI control.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      COBIT 2019 has no human-oversight-of-AI objective.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.3.9"
    label: "Automated decision making"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.3.9 addresses PII principals' rights regarding automated decision-making;
      relevant to oversight only for personal-data decisions.
    reviewer: "Vinod Dhiman"
