id: MC-D1-02
title: Roles, responsibilities and accountability
domain: d1-accountability-governance
objective: >
  Define and assign clear roles, responsibilities, and lines of accountability for the
  development, deployment, and oversight of AI systems.
principle: "Clear ownership and accountability"
evidence:
  - "RACI matrix"
  - "role and responsibility definitions"
  - "AI governance org chart"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.3.2"
    label: "AI roles and responsibilities"
    relationship: full
    confidence: high
    rationale: >
      Annex A.3.2 with clause 5.3 requires defined, communicated AI roles and
      responsibilities.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-2.1"
    label: "Roles, responsibilities and lines of communication documented"
    relationship: full
    confidence: high
    rationale: >
      GOVERN 2.1 requires documented, clear roles, responsibilities, and communication
      lines.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.16"
    label: "Obligations of providers of high-risk AI systems"
    relationship: partial
    confidence: medium
    rationale: >
      Art.16 with Art.26 allocates accountability by role; statutory obligations rather than
      an internal RACI.
    reviewer: "Vinod Dhiman"
