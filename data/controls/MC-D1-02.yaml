id: MC-D1-02
title: Roles, responsibilities and accountability
domain: d1-accountability-governance
objective: >
  Define and assign clear roles, responsibilities, and lines of accountability for the
  development, deployment, and oversight of AI systems.
principle: "Clear ownership and accountability"
evidence:
  - "RACI matrix"
  - "role and responsibility definitions"
  - "AI governance org chart"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.3.2"
    label: "AI roles and responsibilities"
    relationship: full
    confidence: high
    rationale: >
      Annex A.3.2 with clause 5.3 requires defined, communicated AI roles and
      responsibilities.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-2.1"
    label: "Roles, responsibilities and lines of communication documented"
    relationship: full
    confidence: high
    rationale: >
      GOVERN 2.1 requires documented, clear roles, responsibilities, and communication
      lines.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.16"
    label: "Obligations of providers of high-risk AI systems"
    relationship: partial
    confidence: medium
    rationale: >
      Art.16 with Art.26 allocates accountability by role; statutory obligations rather than
      an internal RACI.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.5.2"
    label: "Information security roles and responsibilities"
    relationship: full
    confidence: high
    rationale: >
      A.5.2 defines and allocates security roles and responsibilities, directly analogous to
      AI governance role assignment.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC1.3"
    label: "Establishes structures, reporting lines, authorities and responsibilities"
    relationship: full
    confidence: medium
    rationale: >
      CC1.3 requires management to establish structures, reporting lines, and assign
      authorities and responsibilities - directly analogous to AI governance roles.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO01"
    label: "Managed I&T management framework (roles and structures)"
    relationship: full
    confidence: medium
    rationale: >
      APO01 defines organizational structures, roles, and responsibilities for I&T
      governance.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
