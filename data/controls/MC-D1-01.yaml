id: MC-D1-01
title: AI policy and governance framework
domain: d1-accountability-governance
objective: >
  Establish, approve, and maintain an organizational AI policy and governance framework
  setting direction and accountability for responsible AI.
principle: "Accountable, well-governed AI"
evidence:
  - "AI policy document"
  - "Statement of Applicability"
  - "management review minutes"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.2.2"
    label: "AI policy"
    relationship: full
    confidence: high
    rationale: >
      Annex A.2.2 with clause 5.2 establishes a leadership-approved AI policy.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-1.4"
    label: "Risk-management process via transparent policies"
    relationship: full
    confidence: medium
    rationale: >
      GOVERN 1.4 establishes the risk-management process through transparent organizational
      policies and controls.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.17"
    label: "Quality management system"
    relationship: partial
    confidence: medium
    rationale: >
      Art.17 requires a QMS including a compliance strategy and written policies; broader
      than a single AI policy.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.5.1"
    label: "Policies for information security"
    relationship: partial
    confidence: medium
    rationale: >
      ISO/IEC 27001 A.5.1 establishes information-security policies; the same management-
      system pattern underpins an AI policy, though the governed subject differs.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC5.3"
    label: "Deploys control activities through policies and procedures"
    relationship: partial
    confidence: medium
    rationale: >
      SOC 2 CC5.3 deploys controls through policies and procedures; it establishes the
      policy mechanism but is not an AI-specific policy.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO01"
    label: "Managed I&T management framework"
    relationship: full
    confidence: medium
    rationale: >
      APO01 establishes the I&T management framework including policies and governance
      structures.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
