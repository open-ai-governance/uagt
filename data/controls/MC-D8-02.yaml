id: MC-D8-02
title: Customer and downstream responsibilities
domain: d8-value-chain-gpai
objective: >
  Manage responsibilities and residual risks passed to customers and downstream users of AI
  systems.
principle: "Responsible handoff to downstream users"
evidence:
  - "customer guidance"
  - "downstream residual-risk disclosures"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.10.4"
    label: "Customers"
    relationship: full
    confidence: medium
    rationale: >
      A.10.4 governs customer relationships and responsibilities.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-1.4"
    label: "Negative residual risks to downstream users documented"
    relationship: full
    confidence: medium
    rationale: >
      MANAGE 1.4 documents residual risks to downstream acquirers and end users.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.26"
    label: "Obligations of deployers of high-risk AI systems"
    relationship: partial
    confidence: medium
    rationale: >
      Art.26 places downstream duties on deployers; partial to a provider-side handoff
      control.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: medium
    rationale: >
      ISO/IEC 27001's supply-chain controls (A.5.19-A.5.22) address suppliers, not
      downstream-customer handoff of residual AI risk.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC2.3"
    label: "External communication / complementary user-entity controls"
    relationship: partial
    confidence: medium
    rationale: >
      SOC 2 reports define complementary user-entity controls - responsibilities to be
      performed by the customer - partially matching downstream handoff of residual risk.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO09"
    label: "Managed service agreements"
    relationship: partial
    confidence: medium
    rationale: >
      APO09 defines consumer-facing service agreements and responsibilities; partially
      matches downstream handoff.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.5"
    label: "PII sharing, transfer, and disclosure"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.5 governs PII sharing and disclosure to third parties; relevant to downstream
      handoff where personal data is involved.
    reviewer: "Vinod Dhiman"
