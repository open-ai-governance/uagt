id: MC-D3-03
title: Data representativeness and bias examination
domain: d3-data-governance-quality
objective: >
  Ensure datasets are relevant and representative and that data-side bias is examined and
  mitigated.
principle: "Fairness; non-discrimination"
evidence:
  - "bias evaluation report"
  - "representativeness analysis"
