id: MC-D6-01
title: Accuracy and reliability
domain: d6-robustness-accuracy-security
objective: >
  Ensure AI systems achieve appropriate levels of accuracy and reliability for their
  intended purpose.
principle: "Valid and reliable systems"
evidence:
  - "accuracy metrics report"
  - "validation results"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.2.4"
    label: "AI system verification and validation"
    relationship: partial
    confidence: medium
    rationale: >
      A.6.2.4 covers verification and validation; accuracy levels are not a discrete Annex A
      control.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.5"
    label: "Validity and reliability demonstrated"
    relationship: full
    confidence: high
    rationale: >
      MEASURE 2.5 with 2.3 demonstrates validity and reliability.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.15"
    label: "Accuracy, robustness and cybersecurity"
    relationship: full
    confidence: high
    rationale: >
      Art.15 binds appropriate accuracy for high-risk systems.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      Model accuracy and reliability are AI-performance concerns outside ISO/IEC 27001's
      information-security scope.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "PI1.5"
    label: "Processing integrity - outputs are complete and accurate"
    relationship: partial
    confidence: medium
    rationale: >
      SOC 2's Processing Integrity (PI1.5) addresses complete and accurate outputs; a
      partial analog for AI accuracy and reliability.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO11"
    label: "Managed quality"
    relationship: partial
    confidence: low
    rationale: >
      APO11 manages quality of solutions and services; a weak analog to AI accuracy and
      reliability.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
