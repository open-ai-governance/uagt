id: MC-D7-02
title: Incident reporting and corrective action
domain: d7-lifecycle-monitoring
objective: >
  Detect, report, and correct serious incidents and malfunctions of AI systems, internally
  and to relevant parties.
principle: "Detect, report, and fix harms"
evidence:
  - "incident register"
  - "serious-incident reports"
  - "corrective-action records"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.8.4"
    label: "Communication of incidents"
    relationship: full
    confidence: high
    rationale: >
      A.8.4 with clause 10.2 covers incident communication and corrective action.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-4.3"
    label: "Incidents communicated; recovery documented"
    relationship: full
    confidence: high
    rationale: >
      MANAGE 4.3 requires incidents and errors communicated with tracking and recovery.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.73"
    label: "Reporting of serious incidents"
    relationship: full
    confidence: high
    rationale: >
      Art.73 requires providers to report serious incidents to authorities.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.5.24"
    label: "Information security incident management planning and preparation"
    relationship: full
    confidence: high
    rationale: >
      A.5.24 with A.5.25-A.5.26 establishes incident management planning, assessment, and
      response - a strong match for incident reporting and corrective action.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC7.4"
    label: "Responds to identified security incidents"
    relationship: full
    confidence: medium
    rationale: >
      CC7.3-CC7.5 establish incident evaluation, response, and recovery - a strong match for
      incident reporting and corrective action.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "DSS02"
    label: "Managed service requests and incidents"
    relationship: full
    confidence: medium
    rationale: >
      DSS02 (with DSS03 problems) establishes incident management - a strong match for
      incident reporting and corrective action.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
