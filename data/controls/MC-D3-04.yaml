id: MC-D3-04
title: Privacy and personal data protection
domain: d3-data-governance-quality
objective: >
  Identify and manage privacy risks and protect personal data used by AI systems, in
  coordination with data-protection law.
principle: "Privacy by design"
evidence:
  - "privacy risk assessment"
  - "DPIA reference"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.4.3"
    label: "Data resources"
    relationship: partial
    confidence: low
    rationale: >
      ISO manages data resources but defers privacy-specific controls to ISO/IEC 27701 and
      external regimes.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.10"
    label: "Privacy risk examined and documented"
    relationship: full
    confidence: medium
    rationale: >
      MEASURE 2.10 requires privacy risk to be examined and documented.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.10"
    label: "Data and data governance"
    relationship: partial
    confidence: medium
    rationale: >
      Art.10(5) conditions special-category processing; broader privacy duties sit in the
      GDPR.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.5.34"
    label: "Privacy and protection of PII"
    relationship: partial
    confidence: medium
    rationale: >
      A.5.34 requires privacy and protection of personally identifiable information; deeper
      privacy controls live in ISO/IEC 27701.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "P"
    label: "Privacy category (P1-P8)"
    relationship: partial
    confidence: medium
    rationale: >
      SOC 2's Privacy category (P-series) addresses notice, choice, collection, use,
      retention, and disposal of personal information; applies when Privacy is in the audit
      scope, hence partial.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO14"
    label: "Managed data (privacy handling)"
    relationship: partial
    confidence: medium
    rationale: >
      APO14 with MEA03 (external compliance) addresses data privacy handling; broader
      privacy obligations sit outside COBIT.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "Clause 7"
    label: "PIMS-specific guidance for PII controllers"
    relationship: superset
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy information management system that comprehensively governs
      PII collection, processing, principals' rights, and sharing - broader than this single
      privacy control.
    reviewer: "Vinod Dhiman"
