id: MC-D6-03
title: Security, cybersecurity and resilience
domain: d6-robustness-accuracy-security
objective: >
  Protect AI systems against security threats, including adversarial manipulation, and
  ensure resilience to attacks and failures.
principle: "Secure and resilient by design"
evidence:
  - "security test/pentest results"
  - "threat model"
  - "resilience plan"
