id: MC-D6-03
title: Security, cybersecurity and resilience
domain: d6-robustness-accuracy-security
objective: >
  Protect AI systems against security threats, including adversarial manipulation, and
  ensure resilience to attacks and failures.
principle: "Secure and resilient by design"
evidence:
  - "security test/pentest results"
  - "threat model"
  - "resilience plan"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 42001 defers information-security controls to ISO/IEC 27001; no dedicated AI
      cybersecurity control in Annex A.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.7"
    label: "Security and resilience evaluated and documented"
    relationship: full
    confidence: high
    rationale: >
      MEASURE 2.7 requires security and resilience to be evaluated and documented.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.15"
    label: "Accuracy, robustness and cybersecurity"
    relationship: full
    confidence: high
    rationale: >
      Art.15 binds cybersecurity, including resilience to adversarial manipulation.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.8"
    label: "Technological controls (Annex A)"
    relationship: superset
    confidence: high
    rationale: >
      ISO/IEC 27001's ISMS comprehensively governs information security and cybersecurity
      (Annex A.8 technological controls and related organizational controls), broader than
      this single AI control - which is exactly why ISO/IEC 42001 defers security to 27001.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC6.1"
    label: "Security - logical and physical access (Common Criteria)"
    relationship: superset
    confidence: high
    rationale: >
      SOC 2's Security category (Common Criteria CC6-CC7) comprehensively governs access,
      security operations, and incident handling, broader than this single AI control -
      independently filling the security gap ISO/IEC 42001 leaves.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO13"
    label: "Managed security"
    relationship: superset
    confidence: high
    rationale: >
      APO13 with DSS05 (Managed Security Services) comprehensively governs information
      security, broader than this single AI control - independently filling the security gap
      ISO/IEC 42001 leaves.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
