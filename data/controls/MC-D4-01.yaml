id: MC-D4-01
title: Transparency and information to deployers and users
domain: d4-transparency-documentation
objective: >
  Provide deployers and users with clear information enabling appropriate interpretation and
  use of an AI system's outputs.
principle: "Transparency to those affected"
evidence:
  - "instructions for use"
  - "model card"
  - "user-facing disclosures"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.8.2"
    label: "System documentation and information for users"
    relationship: full
    confidence: high
    rationale: >
      A.8.2 requires system documentation and information for users.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.8"
    label: "Transparency and accountability risks examined"
    relationship: full
    confidence: medium
    rationale: >
      MEASURE 2.8 with 2.9 examines transparency and explainability.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.13"
    label: "Transparency and provision of information to deployers"
    relationship: full
    confidence: high
    rationale: >
      Art.13 requires transparency and instructions for use for deployers.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27001 has no control for transparency or provision of information to deployers
      and users of an AI system.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC2.3"
    label: "Communicates with external parties"
    relationship: partial
    confidence: low
    rationale: >
      CC2.3 covers external communication of objectives and responsibilities; it partially
      supports providing information to deployers but not AI-output transparency.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO09"
    label: "Managed service agreements"
    relationship: partial
    confidence: low
    rationale: >
      APO09 defines service agreements and information provided to service consumers;
      partially relevant to information for deployers.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.3.2"
    label: "Determining information for PII principals"
    relationship: partial
    confidence: medium
    rationale: >
      Clause 7.3.2-7.3.3 require providing information to PII principals; a privacy-scoped
      form of transparency.
    reviewer: "Vinod Dhiman"
