    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "BAI04"
    label: "Managed availability and capacity"
    relationship: partial
    confidence: low
    rationale: >
      BAI04 (with DSS04 continuity) addresses availability and resilience; partially
      relevant to robustness, not model safety.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
