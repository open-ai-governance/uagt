      SOC 2 has no control for marking or disclosing AI-generated or synthetic content.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      COBIT 2019 has no control for AI-generated or synthetic content disclosure.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
