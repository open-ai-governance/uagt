id: MC-D4-02
title: Technical documentation
domain: d4-transparency-documentation
objective: >
  Maintain technical documentation sufficient to demonstrate how an AI system was developed
  and how it meets applicable requirements.
principle: "Demonstrable, documented compliance"
evidence:
  - "technical documentation file (Annex IV)"
  - "design and development records"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.2.7"
    label: "AI system technical documentation"
    relationship: full
    confidence: high
    rationale: >
      A.6.2.7 requires technical documentation across the life cycle.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-2.3"
    label: "Data and input documentation"
    relationship: partial
    confidence: low
    rationale: >
      NIST treats documentation as cross-cutting; no single technical-documentation
      subcategory.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.11"
    label: "Technical documentation"
    relationship: full
    confidence: high
    rationale: >
      Art.11 with Annex IV prescribes technical documentation for high-risk systems.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: medium
    rationale: >
      AI technical documentation (EU Annex IV style) has no direct ISO/IEC 27001 equivalent;
      27001 documents an ISMS, not AI system design.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: null
    label: null
    relationship: none
    confidence: medium
    rationale: >
      SOC 2 has no AI technical-documentation criterion; its system description documents
      the service organization, not AI system design.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "BAI08"
    label: "Managed knowledge"
    relationship: partial
    confidence: medium
    rationale: >
      BAI08 manages documentation and knowledge; partially covers technical documentation.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
