id: MC-DG-02
title: Data preparation, representativeness and bias examination
domain: data-governance
objective: >
  Ensure datasets are appropriately prepared, relevant, and representative, and that data-
  side bias is examined and mitigated.
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.7.6"
    label: "Data preparation"
    relationship: full
    confidence: medium
    rationale: >
      A.7.6 (with A.7.4 quality) covers preparation of data; representativeness/bias is
      addressed via data quality.
    reviewer: "draft"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.11"
    label: "Fairness and bias evaluated and documented"
    relationship: partial
    confidence: medium
    rationale: >
      MEASURE 2.11 evaluates fairness and bias at the measurement stage; data-side
      representativeness is only partially captured here.
    reviewer: "draft"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.10"
    label: "Data and data governance"
    relationship: full
    confidence: high
    rationale: >
      Art.10 requires relevant, sufficiently representative datasets and examination in
      view of possible biases.
    reviewer: "draft"
