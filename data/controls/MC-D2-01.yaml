id: MC-D2-01
title: AI risk assessment and treatment
domain: d2-risk-impact-assessment
objective: >
  Establish a documented, repeatable process to identify, analyze, evaluate, and treat risks
  arising from AI systems across their lifecycle.
principle: "Risk-based, proportionate governance"
evidence:
  - "AI risk register"
  - "risk treatment plan"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "8.2"
    label: "AI risk assessment"
    relationship: full
    confidence: high
    rationale: >
      Clause 8.2 with 6.1 requires a defined AI risk assessment and treatment process.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MANAGE-1.1"
    label: "AI risks prioritized, responded to, and managed"
    relationship: partial
    confidence: medium
    rationale: >
      Risk activity is distributed across MAP/MEASURE/MANAGE rather than one consolidated
      process.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.9"
    label: "Risk management system"
    relationship: full
    confidence: high
    rationale: >
      Art.9 mandates a continuous, iterative risk-management system for high-risk systems.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "6.1.2"
    label: "Information security risk assessment"
    relationship: partial
    confidence: medium
    rationale: >
      ISO/IEC 27001 clauses 6.1.2-6.1.3 establish a risk assessment and treatment process;
      the methodology aligns but its scope is information-security risk, not the full
      breadth of AI risk.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC3.2"
    label: "Identifies and analyzes risk"
    relationship: partial
    confidence: medium
    rationale: >
      SOC 2 CC3 establishes a risk assessment process (CC3.2); methodology aligns but its
      scope is trust-services (security) risk, not the breadth of AI risk.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO12"
    label: "Managed risk"
    relationship: full
    confidence: high
    rationale: >
      APO12 establishes an enterprise risk management process - a strong match for AI risk
      assessment and treatment.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
