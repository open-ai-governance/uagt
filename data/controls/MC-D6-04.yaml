id: MC-D6-04
title: Verification, validation and testing (TEVV)
domain: d6-robustness-accuracy-security
objective: >
  Test, evaluate, verify, and validate AI systems against defined criteria before and during
  deployment.
principle: "Test before and during use"
evidence:
  - "TEVV plan"
  - "test reports"
  - "conformity assessment record"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.6.2.4"
    label: "AI system verification and validation"
    relationship: full
    confidence: high
    rationale: >
      A.6.2.4 directly requires verification and validation of AI systems.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MEASURE-2.1"
    label: "Test sets, metrics and TEVV documented"
    relationship: full
    confidence: high
    rationale: >
      MEASURE 2.1 with 2.3 documents test sets, metrics, and TEVV tools.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.15"
    label: "Accuracy, robustness and cybersecurity"
    relationship: partial
    confidence: medium
    rationale: >
      Art.15 implies testing of accuracy/robustness; formal conformity testing sits in
      Art.43.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.8.29"
    label: "Security testing in development and acceptance"
    relationship: partial
    confidence: medium
    rationale: >
      A.8.29 requires security testing during development and acceptance; it aligns with
      TEVV but is scoped to security testing.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC8.1"
    label: "Change management - testing prior to deployment"
    relationship: partial
    confidence: medium
    rationale: >
      CC8.1 requires changes to be tested and authorized before deployment; it aligns with
      TEVV but is scoped to change/security testing.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "BAI07"
    label: "Managed IT change acceptance and transitioning"
    relationship: partial
    confidence: medium
    rationale: >
      BAI07 requires acceptance testing before transition; aligns with TEVV but is change-
      acceptance-scoped.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
