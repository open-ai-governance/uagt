id: MC-D3-01
title: Data acquisition and provenance
domain: d3-data-governance-quality
objective: >
  Govern how data is acquired and track its origin and provenance across the AI lifecycle.
principle: "Trustworthy data lineage"
evidence:
  - "data provenance records"
  - "data acquisition log"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.7.5"
    label: "Data provenance"
    relationship: full
    confidence: high
    rationale: >
      A.7.5 with A.7.3 addresses provenance and acquisition of data for AI systems.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-2.3"
    label: "Data and input documentation"
    relationship: partial
    confidence: low
    rationale: >
      NIST documents data across MAP; provenance is not a discrete subcategory.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.10"
    label: "Data and data governance"
    relationship: full
    confidence: high
    rationale: >
      Art.10 requires governance practices covering data collection and origin.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27001 governs information assets but has no control for training-data
      provenance or lineage.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      SOC 2 has no control for training-data provenance or lineage.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO14"
    label: "Managed data"
    relationship: partial
    confidence: medium
    rationale: >
      APO14 governs data management across its lifecycle; partially covers data acquisition
      and provenance.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.2.1"
    label: "Identify and document purpose"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.2.1 documents purpose and basis for PII collection; relevant to data
      acquisition where the data is personal.
    reviewer: "Vinod Dhiman"
