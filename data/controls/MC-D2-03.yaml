id: MC-D2-03
title: Risk tolerance and acceptance criteria
domain: d2-risk-impact-assessment
objective: >
  Define organizational risk tolerance and criteria for accepting residual AI risk, and
  align risk-management activity to them.
principle: "Risk decisions against defined tolerance"
evidence:
  - "risk acceptance criteria"
  - "residual-risk sign-off"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "6.1"
    label: "Actions to address risks and opportunities"
    relationship: partial
    confidence: medium
    rationale: >
      Clause 6.1 frames risk criteria; ISO does not separately codify a risk-tolerance
      statement.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-1.3"
    label: "Risk-management activity set per risk tolerance"
    relationship: full
    confidence: high
    rationale: >
      GOVERN 1.3 with MAP 1.5 sets the level of activity according to documented risk
      tolerance.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.9"
    label: "Risk management system"
    relationship: partial
    confidence: medium
    rationale: >
      Art.9 requires judging acceptable residual risk; partial to a standalone tolerance
      control.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "6.1.2"
    label: "Information security risk assessment (risk acceptance criteria)"
    relationship: partial
    confidence: medium
    rationale: >
      Clause 6.1.2 requires defined risk acceptance criteria, but scoped to information-
      security risk rather than AI risk generally.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC3.1"
    label: "Specifies objectives to enable risk identification (risk tolerances)"
    relationship: partial
    confidence: medium
    rationale: >
      CC3.1 requires specifying objectives with sufficient clarity to identify risk and
      define tolerances; scoped to trust-services risk.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "EDM03"
    label: "Ensured risk optimization"
    relationship: partial
    confidence: medium
    rationale: >
      EDM03 sets enterprise risk appetite and tolerance; scoped to enterprise I&T risk
      rather than AI risk broadly.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
