id: MC-D3-02
title: Data quality and preparation
domain: d3-data-governance-quality
objective: >
  Ensure datasets used to train, validate, and test AI systems are appropriately prepared
  and governed for quality.
principle: "Fit-for-purpose data"
evidence:
  - "data quality criteria"
  - "data preparation records"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.7.4"
    label: "Quality of data for AI systems"
    relationship: full
    confidence: high
    rationale: >
      A.7.4 with A.7.6 addresses data quality and preparation for AI systems.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "MAP-2.3"
    label: "Data and input documentation"
    relationship: partial
    confidence: medium
    rationale: >
      Covers documentation of data; quality thresholds implied, not prescribed.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.10"
    label: "Data and data governance"
    relationship: full
    confidence: high
    rationale: >
      Art.10 requires relevant, sufficiently representative datasets governed for quality.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      Data quality and preparation for AI fall outside ISO/IEC 27001's information-security
      scope.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "PI1.2"
    label: "Processing integrity - inputs are complete and accurate"
    relationship: partial
    confidence: low
    rationale: >
      SOC 2's Processing Integrity category concerns complete and accurate processing of
      inputs; it partially touches data quality but not ML data governance.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO14"
    label: "Managed data (data quality)"
    relationship: partial
    confidence: medium
    rationale: >
      APO14 includes data quality management; not specific to AI training-data preparation.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: "7.4.3"
    label: "Accuracy and quality"
    relationship: partial
    confidence: low
    rationale: >
      Clause 7.4.3 addresses accuracy and quality of PII; relevant to data quality where the
      data is personal.
    reviewer: "Vinod Dhiman"
