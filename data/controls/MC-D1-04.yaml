id: MC-D1-04
title: AI literacy, competence and training
domain: d1-accountability-governance
objective: >
  Ensure personnel and relevant partners have sufficient AI literacy and competence for
  their roles in the AI lifecycle.
principle: "Competent people governing AI"
evidence:
  - "training records"
  - "competence matrix"
  - "AI literacy programme"
mappings:
  - framework: ISO-IEC-42001
    version: "2023"
    ref: "A.4.6"
    label: "Human resources"
    relationship: full
    confidence: medium
    rationale: >
      A.4.6 with clause 7.2 addresses the competence of human resources for AI systems.
    reviewer: "Vinod Dhiman"
  - framework: NIST-AI-RMF
    version: "1.0"
    ref: "GOVERN-2.2"
    label: "Personnel and partners receive AI risk-management training"
    relationship: full
    confidence: high
    rationale: >
      GOVERN 2.2 requires that personnel and partners receive AI risk-management training.
    reviewer: "Vinod Dhiman"
  - framework: EU-AI-ACT
    version: "2024/1689"
    ref: "Art.4"
    label: "AI literacy"
    relationship: full
    confidence: high
    rationale: >
      Art.4 obliges providers and deployers to ensure a sufficient level of AI literacy
      among staff.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27001
    version: "2022"
    ref: "A.6.3"
    label: "Information security awareness, education and training"
    relationship: partial
    confidence: medium
    rationale: >
      A.6.3 mandates security awareness and training; it parallels AI literacy and training
      but is scoped to information security.
    reviewer: "Vinod Dhiman"
  - framework: SOC-2
    version: "2017"
    ref: "CC1.4"
    label: "Commitment to competence"
    relationship: partial
    confidence: medium
    rationale: >
      CC1.4 (commitment to competence) supports training and capability, but is not AI-
      literacy-specific.
    reviewer: "Vinod Dhiman"
  - framework: COBIT-2019
    version: "2019"
    ref: "APO07"
    label: "Managed human resources"
    relationship: partial
    confidence: medium
    rationale: >
      APO07 manages skills and competencies; partially supports AI literacy and training.
    reviewer: "Vinod Dhiman"
  - framework: ISO-IEC-27701
    version: "2019"
    ref: null
    label: null
    relationship: none
    confidence: high
    rationale: >
      ISO/IEC 27701 is a privacy (PII) management extension to ISO/IEC 27001; it has no
      equivalent for this non-privacy control.
    reviewer: "Vinod Dhiman"
