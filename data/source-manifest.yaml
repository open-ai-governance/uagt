# UAGT Source Manifest
# The pinned version/date of each source framework that the current build reflects.
# Every mapping in data/controls/*.yaml must reference a framework + version listed
# here (enforced in CI by scripts/build_tables.py --check). Bumping a version here is
# a deliberate, changelog-worthy event (see GOVERNANCE.md and section 8.6 of the design).

manifest_version: "0.1.0"
updated: "2026-06-23"

frameworks:
  - id: ISO-IEC-42001
    name: "ISO/IEC 42001:2023 - Artificial intelligence management system"
    version: "2023"
    structure: "Management-system clauses (4-10) + Annex A controls (A.x)"
    issuer: "ISO/IEC"
    obtain_from: "https://www.iso.org/standard/81230.html"
    notes: "Referenced by clause number and Annex A control id only; text not reproduced."

  - id: NIST-AI-RMF
    name: "NIST AI Risk Management Framework 1.0 (NIST AI 100-1)"
    version: "1.0"
    structure: "Functions: GOVERN / MAP / MEASURE / MANAGE, with categories and subcategories"
    issuer: "NIST"
    obtain_from: "https://doi.org/10.6028/NIST.AI.100-1"
    notes: "Subcategory ids used, e.g. MAP-2.3, GOVERN-1.1."

  - id: EU-AI-ACT
    name: "Regulation (EU) 2024/1689 (EU AI Act)"
    version: "2024/1689"
    structure: "113 articles + 13 annexes, risk-tiered obligations"
    issuer: "European Union"
    obtain_from: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"
    amendments:
      - name: "Digital Omnibus on AI"
        status: "Provisional political agreement 7 May 2026; formal adoption expected ~June-July 2026"
        tracked: true
        notes: >
          High-risk obligations for Annex III deferred to 2 Dec 2027 and Annex I to 2 Aug 2028;
          new Art.5 prohibition (NCII/CSAM) from 2 Dec 2026; Art.50 transparency, GPAI penalty
          powers and market surveillance remain live for 2 Aug 2026. Not yet in the Official
          Journal as of this manifest date - mappings reflect 2024/1689 as enacted, with the
          Omnibus tracked in the changelog until publication triggers a MAJOR version bump.
    notes: "Referenced by Article number only; text not reproduced."

  # ISO/IEC 27001 is an OPTIONAL attached framework (not part of the required three-way
  # coverage). It demonstrates the normalized control layer's extensibility: a new framework
  # maps to the Master Control Set where a genuine equivalent exists, without disturbing the
  # anchor mappings. Coverage is partial/in-progress, concentrated where 27001's ISMS controls
  # apply (security, logging, incidents, suppliers, governance).
  - id: ISO-IEC-27001
    name: "ISO/IEC 27001:2022 - Information security management system"
    version: "2022"
    structure: "Management-system clauses (4-10) + Annex A: 93 controls in 4 themes (A.5 Organizational, A.6 People, A.7 Physical, A.8 Technological)"
    issuer: "ISO/IEC"
    obtain_from: "https://www.iso.org/standard/27001"
    required: false
    notes: "Referenced by Annex A control id only; text not reproduced."

  # SOC 2 (AICPA Trust Services Criteria) - a second OPTIONAL attached framework. Strong on
  # security/governance/operations (Common Criteria), absent on AI-specific concerns.
  - id: SOC-2
    name: "AICPA SOC 2 - Trust Services Criteria (TSC)"
    version: "2017"
    structure: "Common Criteria CC1-CC9 (Security) + Availability (A1), Processing Integrity (PI1), Confidentiality (C1), Privacy (P1-P8)"
    issuer: "AICPA"
    obtain_from: "https://www.aicpa-cima.com/resources/landing/system-and-organization-controls-soc-suite-of-services"
    required: false
    notes: "2017 TSC (with 2022 revised points of focus). Referenced by criterion id only; text not reproduced."

  # COBIT 2019 - broad IT/enterprise-governance framework (OPTIONAL). Maps widely across
  # governance, risk, lifecycle, monitoring, and vendor management.
  - id: COBIT-2019
    name: "COBIT 2019 - Governance and management of enterprise I&T"
    version: "2019"
    structure: "40 governance/management objectives across EDM, APO, BAI, DSS, MEA domains"
    issuer: "ISACA"
    obtain_from: "https://www.isaca.org/resources/cobit"
    required: false
    notes: "Referenced by objective id only; text not reproduced."

  # ISO/IEC 27701 - privacy information management extension to ISO/IEC 27001 (OPTIONAL).
  # Narrow/privacy-focused: maps strongly to privacy and data controls, none elsewhere.
  - id: ISO-IEC-27701
    name: "ISO/IEC 27701:2019 - Privacy information management system (PIMS)"
    version: "2019"
    structure: "Extends ISO/IEC 27001/27002 + PIMS-specific guidance (clause 7 PII controllers, clause 8 PII processors)"
    issuer: "ISO/IEC"
    obtain_from: "https://www.iso.org/standard/71670.html"
    required: false
    notes: "Referenced by clause id only; text not reproduced."

# Companion sources referenced in rationale but not themselves mapped targets. They inform
# specific domains (e.g. ISO/IEC 42005 for D2 impact assessment; the NIST Generative AI
# Profile for D8 GPAI). Mappings still resolve only to the three anchor frameworks above.
companions:
  - id: ISO-IEC-42005
    name: "ISO/IEC 42005:2025 - AI system impact assessment"
    informs: ["d2-risk-impact-assessment"]
  - id: NIST-AI-600-1
    name: "NIST AI 600-1 - Generative AI Profile (2024)"
    informs: ["d8-value-chain-gpai"]

# The cited methodology this crosswalk implements (paper <-> repo reciprocal citation, FR8).
methodology:
  title: >
    Bridging AI Risk Frameworks: Reconciling ISO/IEC 42001, the NIST AI Risk Management
    Framework, and the EU AI Act into a Unified Governance Taxonomy
  author: "Vinod Dhiman"
  taxonomy: "Unified AI Governance Taxonomy (UAGT) - 5 analytical layers, 8 governance domains"
  doi: ""  # add the preprint/paper DOI once available
